name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      ARDUINO_CONFIG_FILE: "$GITHUB_WORKSPACE"/arduino-cli.yaml
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
      - uses: arduino/setup-arduino-cli@81d310742121c928ea9c8bbd407b4217b432ae02 # v2.0.0
        with:
          version: "1.3"
      - name: Install dependencies
        run:
          - arduino-cli core install TinyCircuits.samd
          -| arduino-cli lib install \
              WiFi101@1.2.7 \
              TinyScreen@1.1.0
          -| arduino-cli lib install --git-url \
              https://github.com/TinyCircuits/TinyCircuits-TSL2572-library.git#71d9024e0aa7fb0b724c3adebac8703a1b065840
      - name: Compile
        run:
          -| arduino-cli compile \
            -b TinyCircuits:samd:tinyscreen \
            "$GITHUB_WORKSPACE"/tinyduino-room
